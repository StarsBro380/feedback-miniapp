<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест отправки</title>
    <!-- Обязательно подключаем библиотеку Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h2>🧪 Тест Mini App</h2>
    <p>Нажмите кнопку ниже, чтобы отправить тестовое сообщение боту.</p>
    
    <button id="test-btn" style="padding: 20px; font-size: 20px; background: green; color: white; border: none; border-radius: 10px;">
        🚀 ОТПРАВИТЬ ТЕСТ
    </button>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();  // Разворачиваем окно
        tg.ready();   // Сообщаем Telegram, что приложение готово

        // Находим кнопку
        document.getElementById('test-btn').addEventListener('click', function() {
            
            // Создаём простые данные для отправки
            const testData = {
                name: "Тестовый пользователь",
                message: "Это тестовое сообщение из Mini App!",
                files: []
            };

            // Отправляем данные боту
            tg.sendData(JSON.stringify(testData));
            
            // Показываем всплывающее окно
            tg.showAlert('✅ Тестовое сообщение отправлено!');
            
            // Закрываем Mini App через 1 секунду
            setTimeout(() => tg.close(), 1000);
        });

        // Настройка кнопки "Назад" в заголовке Mini App
        tg.BackButton.show();
        tg.BackButton.onClick(() => tg.close());
    </script>
</body>
</html>
